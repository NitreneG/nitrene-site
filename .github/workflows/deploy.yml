name: Deploy nitrene site

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: nitrene-site-production
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
      SERVER_PATH: ${{ secrets.SERVER_PATH || '/var/www/nitrene-site' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required files
        run: |
          test -d src
          test -d public
          test -f package.json
          test -f pnpm-lock.yaml
          test -f astro.config.mjs

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm run build

      - name: Configure SSH
        run: |
          missing=0
          if [ -z "$SERVER_HOST" ]; then
            echo "::error::Missing repository secret: SERVER_HOST"
            missing=1
          fi
          if [ -z "$SERVER_USER" ]; then
            echo "::error::Missing repository secret: SERVER_USER"
            missing=1
          fi
          if [ -z "${{ secrets.SERVER_SSH_KEY }}" ]; then
            echo "::error::Missing repository secret: SERVER_SSH_KEY"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/nitrene_site_deploy
          chmod 600 ~/.ssh/nitrene_site_deploy
          ssh-keyscan -T 10 -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Prepare release directory
        run: |
          RELEASE_ID="${GITHUB_SHA::12}-$(date -u +%Y%m%d%H%M%S)"
          echo "RELEASE_ID=$RELEASE_ID" >> "$GITHUB_ENV"
          timeout 45s ssh \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=3 \
            -i ~/.ssh/nitrene_site_deploy \
            -p "$SERVER_PORT" \
            "$SERVER_USER@$SERVER_HOST" 'bash -s' -- "$SERVER_PATH" "$RELEASE_ID" <<'REMOTE'
          set -euo pipefail
          SERVER_PATH="$1"
          RELEASE_ID="$2"
          RELEASE_PATH="$SERVER_PATH/releases/$RELEASE_ID"
          mkdir -p "$RELEASE_PATH"
          if [ -d "$SERVER_PATH/current" ]; then
            cp -al "$SERVER_PATH/current/." "$RELEASE_PATH/"
          fi
          mkdir -p "$SERVER_PATH/shared"
          REMOTE

      - name: Upload site
        run: |
          timeout 15m rsync -azc --delete \
            --timeout=120 \
            --outbuf=L \
            --info=NAME,PROGRESS2,STATS2 \
            -e "ssh -o BatchMode=yes -o ConnectTimeout=15 -o ServerAliveInterval=15 -o ServerAliveCountMax=3 -i ~/.ssh/nitrene_site_deploy -p $SERVER_PORT" \
            dist/ "$SERVER_USER@$SERVER_HOST:$SERVER_PATH/releases/$RELEASE_ID/"

      - name: Activate release
        run: |
          timeout 45s ssh \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=3 \
            -i ~/.ssh/nitrene_site_deploy \
            -p "$SERVER_PORT" \
            "$SERVER_USER@$SERVER_HOST" 'bash -s' -- "$SERVER_PATH" "$RELEASE_ID" <<'REMOTE'
          set -euo pipefail
          SERVER_PATH="$1"
          RELEASE_ID="$2"
          if [ -e "$SERVER_PATH/current" ] && [ ! -L "$SERVER_PATH/current" ]; then
            mv "$SERVER_PATH/current" "$SERVER_PATH/manual-before-actions-$(date -u +%Y%m%d%H%M%S)"
          fi
          ln -sfn "$SERVER_PATH/releases/$RELEASE_ID" "$SERVER_PATH/current"
          REMOTE
