      <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

  <div class="nitrene-footer-runtime">
    <span>Running for</span>
    <strong id="nitrene-site-uptime">0 days 0 hours 0 minutes</strong>
    <span>since 2026-06-30</span>
  </div>
</div>

<script>
  (() => {
    const start = new Date("2026-06-30T00:00:00+08:00").getTime();
    const target = document.getElementById("nitrene-site-uptime");
    if (!target) return;

    const updateRuntime = () => {
      const elapsedMs = Math.max(0, Date.now() - start);
      const totalMinutes = Math.floor(elapsedMs / 60000);
      const days = Math.floor(totalMinutes / 1440);
      const hours = Math.floor((totalMinutes % 1440) / 60);
      const minutes = totalMinutes % 60;
      target.textContent = days + " days " + hours + " hours " + minutes + " minutes";
    };

    updateRuntime();
    window.setInterval(updateRuntime, 60000);
  })();
</script>
